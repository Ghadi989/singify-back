name: CI/CD — Singify Backend

on:
  push:
    branches: [ "main", "backend-init-ghadi" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ─── Stage 1: Build & Test (every push) ──────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: ./mvnw test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: target/surefire-reports/

  # ─── Stage 2: Deploy to Production (main branch only) ────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests

      - name: Deploy to Production
        run: |
          echo "Deploying to production..."
          echo "Profile: prod"
          echo "Artifact: $(ls target/*.jar)"
          # java -jar -Dspring.profiles.active=prod target/*.jar
