name: CI

on:
  push:
    branches: [main, develop, pre-prod]
  pull_request:
    branches: [main, develop, pre-prod]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      # compile → test → jacoco:report → jacoco:check (quality gate) → package
      - name: Build, test & coverage gate
        run: ./mvnw verify -B

      # Print instruction & branch coverage to the Actions job summary
      - name: Coverage summary
        if: always()
        run: |
          REPORT=target/site/jacoco/jacoco.xml
          if [ ! -f "$REPORT" ]; then
            echo "No JaCoCo report found — tests may have been skipped." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          INSTR_MISSED=$(grep -oP 'type="INSTRUCTION"[^/]*/>' "$REPORT" | grep -oP 'missed="\K[0-9]+' | awk '{s+=$1}END{print s}')
          INSTR_COVERED=$(grep -oP 'type="INSTRUCTION"[^/]*/>' "$REPORT" | grep -oP 'covered="\K[0-9]+' | awk '{s+=$1}END{print s}')
          BRANCH_MISSED=$(grep -oP 'type="BRANCH"[^/]*/>' "$REPORT" | grep -oP 'missed="\K[0-9]+' | awk '{s+=$1}END{print s}')
          BRANCH_COVERED=$(grep -oP 'type="BRANCH"[^/]*/>' "$REPORT" | grep -oP 'covered="\K[0-9]+' | awk '{s+=$1}END{print s}')

          INSTR_TOTAL=$((INSTR_MISSED + INSTR_COVERED))
          BRANCH_TOTAL=$((BRANCH_MISSED + BRANCH_COVERED))

          if [ $INSTR_TOTAL -gt 0 ]; then
            INSTR_PCT=$(awk "BEGIN{printf \"%.1f\", $INSTR_COVERED/$INSTR_TOTAL*100}")
          else
            INSTR_PCT="N/A"
          fi
          if [ $BRANCH_TOTAL -gt 0 ]; then
            BRANCH_PCT=$(awk "BEGIN{printf \"%.1f\", $BRANCH_COVERED/$BRANCH_TOTAL*100}")
          else
            BRANCH_PCT="N/A"
          fi

          echo "## JaCoCo Coverage" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Counter | Covered | Total | % | Gate |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|---------|-------|---|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Instructions | $INSTR_COVERED | $INSTR_TOTAL | ${INSTR_PCT}% | ≥ 60% |" >> $GITHUB_STEP_SUMMARY
          echo "| Branches | $BRANCH_COVERED | $BRANCH_TOTAL | ${BRANCH_PCT}% | ≥ 50% |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: singify-back:latest
