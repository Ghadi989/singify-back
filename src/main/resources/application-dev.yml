spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/singify_dev
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 1000
        delivery.timeout.ms: 2000
        request.timeout.ms: 1000
    consumer:
      group-id: singify-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    admin:
      auto-create: false
      fail-fast: false

server:
  port: 8080

jwt:
  secret: devSecretKeyForSingifyThatIsLongEnough1234567890
  expiration-ms: 86400000

gcs:
  bucket-name: singify-dev-bucket
  credentials-path: classpath:gcs-credentials-dev.json

lrclib:
  base-url: https://lrclib.net/api

ytdlp:
  base-url: http://localhost:8000

backend:
  base-url: http://localhost:8080

cors:
  allowed-origins: http://localhost:5173,http://localhost:3000

spotify:
  client-id: ${SPOTIFY_CLIENT_ID:}
  client-secret: ${SPOTIFY_CLIENT_SECRET:}

logging:
  level:
    com.gray.singifyback: DEBUG
    org.springframework.security: DEBUG
    org.apache.kafka: ERROR
    org.springframework.kafka: ERROR
