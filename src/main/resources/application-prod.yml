spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 500          # fail fast if Kafka is unreachable
        delivery.timeout.ms: 1000
        request.timeout.ms: 500
    consumer:
      group-id: singify-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    admin:
      auto-create: false
      fail-fast: false             # don't crash on startup if Kafka is absent

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000

gcs:
  bucket-name: ${GCS_BUCKET_NAME}
  credentials-path: ${GCS_CREDENTIALS_PATH}

lrclib:
  base-url: https://lrclib.net/api

ytdlp:
  base-url: ${YTDLP_BASE_URL:http://ytdlp:8000}

backend:
  base-url: ${BACKEND_BASE_URL:http://localhost:8080}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

spotify:
  client-id: ${SPOTIFY_CLIENT_ID:}
  client-secret: ${SPOTIFY_CLIENT_SECRET:}

logging:
  level:
    com.gray.singifyback: INFO
