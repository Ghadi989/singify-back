spring:
  datasource:
    url: jdbc:h2:mem:singify_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:19999
    producer:
      properties:
        max.block.ms: 100
        delivery.timeout.ms: 200
        request.timeout.ms: 100
    listener:
      auto-startup: false
    admin:
      auto-create: false
      fail-fast: false

jwt:
  secret: testSecretKeyForSingifyThatIsLongEnough123456789
  expiration-ms: 3600000

lrclib:
  base-url: https://lrclib.net/api

ytdlp:
  base-url: http://localhost:8000

backend:
  base-url: http://localhost:8080

spotify:
  client-id: ""
  client-secret: ""

logging:
  level:
    org.apache.kafka: OFF
    org.springframework.kafka: OFF
    com.gray.singifyback: WARN

cors:
  allowed-origins: http://localhost:3000
